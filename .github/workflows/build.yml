name: Build Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-electron:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
            mac_arch: arm64
          - os: macos-13
            platform: mac
            mac_arch: x64
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set package.json version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version

      - name: Install npm dependencies
        run: npm ci

      - name: Install platform-specific sherpa-onnx (Linux)
        if: matrix.platform == 'linux'
        run: npm install sherpa-onnx-linux-x64@^1.12.18

      - name: Install platform-specific sherpa-onnx (macOS)
        if: matrix.platform == 'mac'
        run: npm install sherpa-onnx-darwin-${{ matrix.mac_arch }}@^1.12.18

      - name: Install platform-specific sherpa-onnx (Windows)
        if: matrix.platform == 'win'
        run: npm install sherpa-onnx-win-x64@^1.12.18

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Download ASR model
        run: npm run download-model

      - name: Build Svelte app
        run: npm run build

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --${{ matrix.mac_arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist directory (Unix)
        if: matrix.platform != 'win'
        run: ls -la dist/ || echo "dist directory not found"

      - name: List dist directory (Windows)
        if: matrix.platform == 'win'
        run: Get-ChildItem dist/ -Force || echo "dist directory not found"
        shell: pwsh

      - name: Upload artifacts (workflow_dispatch runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: jutukuva-${{ matrix.platform }}${{ matrix.mac_arch && format('-{0}', matrix.mac_arch) || '' }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: ignore

      - name: Upload to Release (Linux)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'linux'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.AppImage
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release (macOS)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'mac'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.dmg
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release (Windows)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'win'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
